server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /css/ {
        add_header Content-Type text/css;
    }

    location /js/ {
        add_header Content-Type application/javascript;
    }
}
