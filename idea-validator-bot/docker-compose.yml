version: "3.8"

services:
  bot:
    build: .
    container_name: idea-validator-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/bot.db

  webapp:
    image: nginx:alpine
    container_name: idea-validator-webapp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./webapp:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  bot_data:
